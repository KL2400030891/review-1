# ===========================================
# PostgreSQL Production Configuration
# Replace application.properties with this file contents for prod
# ===========================================
spring.application.name=placement-system
server.port=8080

# ===========================================
# PostgreSQL (Supabase / Production)
# ===========================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/placementdb}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:yourpassword}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10

# ===========================================
# JPA / Hibernate
# ===========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ===========================================
# JWT
# ===========================================
app.jwt.secret=${JWT_SECRET:CHANGE_THIS_TO_STRONG_RANDOM_SECRET_IN_PRODUCTION}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ===========================================
# CORS
# ===========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-frontend-domain.com}

# ===========================================
# H2 Disabled in Production
# ===========================================
spring.h2.console.enabled=false

# ===========================================
# Actuator
# ===========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ===========================================
# Logging
# ===========================================
logging.level.com.placement=INFO
logging.level.org.springframework.security=WARN
