# ===========================================
# Application Configuration
# ===========================================
spring.application.name=placement-system
server.port=8080

# ===========================================
# H2 In-Memory Database (Local Dev / Default)
# ===========================================
spring.datasource.url=jdbc:h2:mem:placementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===========================================
# JPA / Hibernate
# ===========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# ===========================================
# JWT Security Configuration
# ===========================================
# IMPORTANT: Change this to a strong, random 256-bit Base64 key in production!
# Generate via: openssl rand -base64 32
app.jwt.secret=PlacementSystemSecretKeyForJWTTokenGenerationChangeInProduction2024!
app.jwt.expiration-ms=86400000
# 24 hours = 86400000 ms
app.jwt.refresh-expiration-ms=604800000
# 7 days

# ===========================================
# CORS Configuration
# ===========================================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:4173

# ===========================================
# Actuator (Health Check Endpoints)
# ===========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=Placement Interaction System
info.app.version=1.0.0

# ===========================================
# Logging
# ===========================================
logging.level.com.placement=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
